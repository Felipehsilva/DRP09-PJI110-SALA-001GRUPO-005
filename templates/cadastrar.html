{% extends 'padrao.html' %}

{% block conteudo %}
{% with messages = get_flashed_messages() %}
{% if messages %}
    <ul class="list-unstyled" id=""messages>
        {% for message in messages %}
            <li class="alert alert-danger">{{ message }}</li>
        {% endfor %}
    </ul>
{% endif %}
{% endwith %}

    <form method="post" action="/adicionar">
        <fieldset>
            

            <div class="mb-3">
                <label for="txtCadastroNomeUser">Nome</label>
                <input type="text" name="txtCadastroNomeUser" id="txtCadastroNomeUser" class="form-control">
            </div>
            
            <div class="mb-3">
                <label for="txtCadastroUser">Usuario</label>
                <input type="text" name="txtCadastroUser" id="txtCadastroUser" class="form-control">
            </div>

            <div class="mb-3">
                <label for="txtCadastroCPF">CPF</label>
                <input type="text" name="txtCadastroCPF" id="txtCadastroCPF" class="form-control">
            </div>

            <div class="mb-3">
                <label>CEP:</label>
                <input type="text" name="txtCEP" id="txtCEP" class="form-control" onblur="buscarCEP()" required>
            </div>
            <div class="mb-3">
                <label>Rua:</label>
                <input type="text" name="txtRua" id="txtRua" class="form-control" readonly>
            </div>
            <div class="mb-3">
                <label>Bairro:</label>
                <input type="text" name="txtBairro" id="txtBairro" class="form-control" readonly>
            </div>

            <div class="mb-3">
                <label for="txtCadastroEmail">Email:</label>
                <input type="text" name="txtCadastroEmail" id="txtCadastroEmail" class="form-control">
            </div>

            <div class="mb-3">
                <label for="txtCadastroTel">Telefone:</label>
                <input type="text" name="txtCadastroTel" id="txtCadastroTel" class="form-control">
            </div>

            <div class="mb-3">
                <label for="txtCadastroSenha">Senha:</label>
                <input type="text" class="form-control" name ="txtCadastroSenha" id="txtCadastroSenha">
            </div>


           
            
            <div class="mb-3">
                <button type="submit" class="btn btn-primary">Cadastrar</button>
            </div>
        </fieldset>
        
    </form>

    <script>
        function buscarCEP() {
            let cep = document.getElementById('txtCEP').value.replace(/\D/g, '');
            if (cep.length !== 8) return;
        
            fetch(`https://viacep.com.br/ws/${cep}/json/`)
                .then(response => response.json())
                .then(data => {
                    if (!data.erro) {
                        document.getElementById('txtRua').value = data.logradouro;
                        document.getElementById('txtBairro').value = data.bairro;
                    } else {
                        alert("CEP não encontrado.");
                    }
                });
        }
        </script>
{% endblock %}
