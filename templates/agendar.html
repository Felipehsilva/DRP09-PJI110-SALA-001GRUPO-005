{% extends 'padrao.html' %}

{% block conteudo %}
<div class="container py-5">
    <h2 class="text-center">Agendamento</h2>

    <form method="post" action="/enviarAgendamento" id="agendamentoForm">
        <div class="mt-4">
            <label for="datepicker">Escolha uma data:</label>
            <input type="text" id="datepicker" name="data" class="form-control w-30" required>
        </div>

        <div class="mt-4">
            <label>Escolha um horário:</label>
            <div class="horarios-container mt-2" id="horarios"></div>
            <input type="hidden" id="horarioInput" name="horario" required>
        </div>

        <div class="mt-4">
            <h4>Resumo:</h4>
            <p>Data escolhida: <span id="dataEscolhida">Nenhuma</span></p>
            <p>Horário escolhido: <span id="horarioEscolhido">Nenhum</span></p>
        </div>

        <div class="mt-4">
            <button type="submit" class="btn btn-primary">Confirmar Agendamento</button>
        </div>
    </form>
</div>

<style>
.horarios-container {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
}
.horario {
    padding: 10px;
    border: 1px solid #007bff;
    border-radius: 5px;
    cursor: pointer;
    text-align: center;
    width: 100px;
    background-color: #f8f9fa;
}
.horario:hover, .horario.selected {
    background-color: #007bff;
    color: white;
}
.horario.disabled {
    background-color: #ddd;
    color: #888;
    cursor: not-allowed;
}
.datepicker-dropdown {
    position: absolute !important;
    left: 50% !important;
    transform: translateX(-50%) !important;
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.9.0/js/bootstrap-datepicker.min.js"></script>
<script>
$(document).ready(function () {

    function gerarHorarios() {
        let horarios = [];
        let hora = 9;
        let minuto = 0;
        while (hora < 18) {
            let horaFormatada = (hora < 10 ? "0" : "") + hora;
            let minutoFormatado = (minuto === 0 ? "00" : "30");
            horarios.push(`${horaFormatada}:${minutoFormatado}`);
            if (minuto === 0) { minuto = 30; } else { minuto = 0; hora++; }
        }
        return horarios;
    }

    function atualizarHorarios(dataSelecionada) {
        let horariosArray = gerarHorarios();
        let horariosDiv = $("#horarios");
        horariosDiv.empty();

        fetch(`/horarios_ocupados?data=${dataSelecionada}`)
            .then(response => response.json())
            .then(data => {
                let ocupados = data.ocupados;
                let hoje = new Date();
                let dataEscolhida = new Date(dataSelecionada.split('/').reverse().join('-'));
                let horaAtual = hoje.getHours();
                let minutoAtual = hoje.getMinutes();

                horariosArray.forEach(horario => {
                    let [hora, minuto] = horario.split(":").map(Number);
                    let estaDesabilitado = false;

                    // Desativa horários passados do dia atual
                    if (dataEscolhida.toDateString() === hoje.toDateString()) {
                        if (hora < horaAtual || (hora === horaAtual && minuto <= minutoAtual)) {
                            estaDesabilitado = true;
                        }
                    }

                    // Desativa horários ocupados
                    if (ocupados.includes(horario)) {
                        estaDesabilitado = true;
                    }

                    let div = `<div class="horario ${estaDesabilitado ? 'disabled' : ''}">${horario}</div>`;
                    horariosDiv.append(div);
                });
            });
    }

    // Inicializa Datepicker
    let hoje = new Date();
    $("#datepicker").datepicker({
        format: "dd/mm/yyyy",
        autoclose: true,
        todayHighlight: true,
        startDate: "today"
    });

    // Define data de hoje
    let dataHoje = hoje.toLocaleDateString("pt-BR");
    $("#datepicker").datepicker('setDate', hoje);
    $("#dataEscolhida").text(dataHoje);

    // Atualiza horários na inicialização
    atualizarHorarios(dataHoje);

    // Atualiza horários quando o usuário muda a data
    $("#datepicker").on("changeDate", function(e) {
        let dataSelecionada = e.format(0);
        $("#dataEscolhida").text(dataSelecionada);
        atualizarHorarios(dataSelecionada);
    });

    // Seleciona horário clicado
    $(document).on("click", ".horario:not(.disabled)", function () {
        $(".horario").removeClass("selected");
        $(this).addClass("selected");
        let horarioSelecionado = $(this).text();
        $("#horarioEscolhido").text(horarioSelecionado);
        $("#horarioInput").val(horarioSelecionado);
    });

    // Validação do formulário
    $("#agendamentoForm").on("submit", function(e) {
        if ($("#horarioInput").val() === "") {
            e.preventDefault();
            alert("Por favor, selecione um horário.");
        }
    });

});
</script>
{% endblock %}
